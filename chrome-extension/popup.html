<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; width: 320px; padding: 14px; margin: 0; }
  h3 { margin: 0 0 10px; font-size: 15px; color: #14b8a6; }
  .site { margin-bottom: 12px; padding: 10px; background: #f8fafc; border-radius: 8px; }
  .site-name { font-size: 12px; font-weight: 700; color: #0f766e; margin-bottom: 6px; letter-spacing: .05em; }
  button { width: 100%; padding: 8px; font-size: 12px; margin-bottom: 6px; border: 1px solid #14b8a6; border-radius: 6px; background: white; color: #0f766e; font-weight: 700; cursor: pointer; }
  button:hover { background: #ccfbf1; }
  button.primary { background: #14b8a6; color: white; }
  button.primary:hover { background: #0f766e; }
  #out { font-size: 11px; padding: 8px; background: #f1f5f9; border-radius: 6px; min-height: 20px; word-break: break-word; }
  .ok { color: #15803d; font-weight: 700; }
  .err { color: #dc2626; font-weight: 700; }
</style>
</head>
<body>
  <h3>🍪 Cookie Exporter</h3>

  <div class="site">
    <div class="site-name">REPLIT.COM</div>
    <button class="primary" data-site="replit" data-action="download">replit-cookies.json 다운로드</button>
    <button data-site="replit" data-action="copy">JSON 복사</button>
  </div>

  <div class="site">
    <div class="site-name">PICKCODE.IO</div>
    <button class="primary" data-site="pickcode" data-action="download">pickcode-cookies.json 다운로드</button>
    <button data-site="pickcode" data-action="copy">JSON 복사</button>
  </div>

  <div id="out">사이트에 로그인된 상태로 버튼을 눌러주세요.</div>
  <script src="popup.js"></script>
</body>
</html>
